<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="../assets/images/tortuga.png">

    <title>Login - Alke Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/app.css" rel="stylesheet">
    <link href="../assets/css/login.css" rel="stylesheet">
</head>

<body data-bs-theme="dark" class="d-flex flex-column min-vh-100">

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="col-11 col-sm-10 col-md-6 col-lg-4">

            <h2 class="text-center fw-bold mb-4 text-menu">
                Inicio de Sesión
            </h2>

            <div class="card shadow-sm rounded-3">
                <div class="card-body p-4 py-5">

                    <form id="loginForm">

                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <input id="username" type="text" class="form-control form-control-lg"
                                placeholder="Ingrese su usuario">

                            <div id="usernameError" class="text-danger mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input id="password" type="password" class="form-control form-control-lg"
                                placeholder="Ingrese su contraseña">

                            <div id="passwordError" class="text-danger mt-1"></div>
                        </div>

                        <button id="loginBtn" class="btn btn-logout w-100 btn-lg" type="submit">
                            <i class="fa-solid fa-right-to-bracket me-1"></i>
                            Iniciar Sesión
                        </button>

                        <div id="loginMessage" class="mt-3 text-center"></div>

                        <div class="mt-3 text-white text-center fs-5 small text-secondary">
                            Usuario: admin@admin.cl<br>
                            Contraseña: 1234
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </main>

    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="toast show text-bg-success border-0">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/afc3eba033.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="../assets/js/login.js" type="module"></script>

</body>

</html>
