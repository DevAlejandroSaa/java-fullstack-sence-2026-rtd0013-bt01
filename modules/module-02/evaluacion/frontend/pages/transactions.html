<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="../assets/images/tortuga.png">

    <title>Últimos movimientos - Alke Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/app.css" rel="stylesheet">
    <link href="../assets/css/pagination.css" rel="stylesheet">
    <link href="../assets/css/user.css" rel="stylesheet">
</head>

<body data-bs-theme="dark" class="d-flex flex-column min-vh-100">

    <header>
        <div class="bg-body-tertiary border-bottom py-3">
            <div class="container text-center">
                <h1 class="fw-bold mb-0 text-balance">
                    Saldo: <span id="balanceText"></span> CLP
                </h1>
            </div>
        </div>

        <div class="container py-3 header-grid">
            <div></div>
            <h2 class="fw-bold mb-0 text-menu text-center">
                Últimos movimientos
            </h2>
            <div class="user-section d-flex align-items-center justify-content-end">
                <span id="userName" class="fw-semibold user-name"></span>
                <div class="user-avatar-circle">
                    <img src="../assets/images/avatar.png" alt="Usuario" class="user-avatar-img" />
                </div>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg border-top border-bottom">
            <div class="container">

                <button class="navbar-toggler mx-auto" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false"
                    aria-label="Mostrar navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">
                    <div class="d-flex flex-column flex-lg-row gap-2 py-3 py-lg-0">

                        <a href="menu.html" id="menuButton" class="btn btn-menu">
                            <i class="fa-solid fa-house me-1"></i>
                            Menú
                        </a>

                        <a href="deposit.html" id="depositButton" class="btn btn-deposit">
                            <i class="fa-solid fa-money-bill-wave me-1"></i>
                            Depositar
                        </a>

                        <a href="sendmoney.html" id="sendButton" class="btn btn-send">
                            <i class="fa-solid fa-paper-plane me-1"></i>
                            Enviar Dinero
                        </a>

                        <a href="#" class="btn btn-history">
                            <i class="fa-solid fa-clock-rotate-left me-1"></i>
                            Últimos movimientos
                        </a>

                        <a href="login.html" id="logoutButton" class="btn btn-logout">
                            <i class="fa-solid fa-right-from-bracket me-1"></i>
                            Cerrar Sesión
                        </a>

                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-7">
                <div class="card">
                    <div class="card-body">
                        <ul id="movementsList" class="list-group list-group-flush"></ul>
                    </div>
                    <div id="paginationContainer"
                        class="d-flex justify-content-center align-items-center flex-wrap gap-1 mt-3">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light text-center py-3 mt-auto">
        <div class="container d-flex flex-column flex-lg-row justify-content-between align-items-center">
            <div class="mb-2 mb-lg-0 text-center text-lg-start">
                <span class="fw-semibold">💳 Wallet Digital</span>
                <small class="text-secondary d-block">
                    Gestión de finanzas personales
                </small>
            </div>
            <div class="text-center text-lg-end">
                <small class="text-secondary">
                    © 2026 Todos los derechos reservados
                </small>
            </div>
        </div>
    </footer>

    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="toast show text-bg-success border-0">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <div class="modal fade" id="movementModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Detalle del movimiento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center">
                    <p><strong>Tipo:</strong> <span id="modalType"></span></p>
                    <p><strong>Monto:</strong> <span id="modalAmount"></span></p>

                    <p id="modalContactContainer" class="d-none">
                        <strong>Destinatario:</strong> <span id="modalContact"></span>
                    </p>

                    <p><strong>Fecha:</strong> <span id="modalDate"></span></p>

                    <p>
                        <strong>ID:</strong>
                        <span id="modalId" class="text-break"></span>
                    </p>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/afc3eba033.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="../assets/js/transactions.js" type="module"></script>

</body>

</html>
