services:
  # ─── NGINX ───────────────────────────────
  aw-wallet:
    image: nginx:alpine
    container_name: aw-wallet
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - "../frontend:/usr/share/nginx/html"
      - "./default.conf:/etc/nginx/conf.d/default.conf"
    networks:
      net_interna:
        aliases:
          - net-aw-wallet

networks:
  net_interna:
    name: net-server
    driver: bridge
    ipam:
      driver: default
