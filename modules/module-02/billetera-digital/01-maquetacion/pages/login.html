<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/DevAlejandroSaa/java-fullstack-sence-2026-rtd0013-bt01/refs/heads/main/modules/module-02/03-billetera-digital/tortuga.png">

    <title>Login - Wallet Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/app.css" rel="stylesheet">
    <link href="../assets/css/login.css" rel="stylesheet">
</head>

<body data-bs-theme="dark" class="d-flex flex-column min-vh-100">

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">

        <div class="col-11 col-sm-10 col-md-6 col-lg-4">

            <h2 class="text-center fw-bold mb-4 text-menu">
                Inicio de Sesión
            </h2>

            <div class="card shadow-sm rounded-3">

                <div class="card-body p-4 py-5">

                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input id="username" type="text" class="form-control form-control-lg"
                            placeholder="Ingrese su usuario">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input id="password" type="password" class="form-control form-control-lg"
                            placeholder="Ingrese su contraseña">
                    </div>

                    <button class="btn btn-logout w-100 btn-lg" type="button" onclick="location.href='menu.html'">
                        <i class="fa-solid fa-right-to-bracket me-1"></i>
                        Iniciar Sesión
                    </button>

                    <div class="mt-3 text-center small text-white">
                        Usuario: admin<br>
                        Contraseña: 1234
                    </div>

                    <div id="loginMessage" class="mt-3 text-center"></div>

                </div>

            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/afc3eba033.js" crossorigin="anonymous"></script>

</body>

</html>
