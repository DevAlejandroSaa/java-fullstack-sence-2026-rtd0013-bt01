<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="../../tortuga.png">

    <title>Enviar dinero - Wallet Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/css/app.css" rel="stylesheet">
</head>

<body data-bs-theme="dark" class="d-flex flex-column min-vh-100">

    <header>

        <div class="bg-body-tertiary border-bottom py-3">
            <div class="container text-center">
                <h3 class="fw-bold mb-0 text-balance">
                    Saldo: $150.000 CLP
                </h3>
            </div>
        </div>

        <div class="container py-3 text-center">
            <h2 class="fw-bold mb-0 text-menu">
                Enviar dinero
            </h2>
        </div>

        <nav class="navbar navbar-expand-lg border-top border-bottom">

            <div class="container">

                <button class="navbar-toggler mx-auto" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse justify-content-center" id="mainNavbar">

                    <div class="d-flex flex-column flex-lg-row gap-2 py-3 py-lg-0">

                        <a href="menu.html" class="btn btn-menu">Menú</a>

                        <a href="deposit.html" class="btn btn-deposit">Depositar</a>

                        <a href="#" class="btn btn-send">Enviar Dinero</a>

                        <a href="transactions.html" class="btn btn-history">Movimientos</a>

                        <a href="login.html" class="btn btn-logout">Cerrar Sesión</a>

                    </div>

                </div>

            </div>

        </nav>

    </header>

    <main class="container my-4">

        <div class="row g-3 align-items-start">

            <div class="col-12 col-lg-3 d-none d-lg-block">

                <label class="form-label">Buscar contacto</label>

                <div class="input-group">

                    <input type="text" class="form-control" placeholder="Nombre o correo">

                    <button class="btn btn-send" type="button">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>

                </div>

            </div>

            <div class="col-12 col-lg-6">

                <div class="card">

                    <div class="card-body">

                        <div class="d-flex d-lg-none gap-2 mb-3">

                            <button class="btn btn-send w-50" data-bs-toggle="modal"
                                data-bs-target="#searchContactModal">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>

                            <button class="btn btn-deposit w-50" data-bs-toggle="modal"
                                data-bs-target="#newContactModal">
                                <i class="fa-solid fa-user-plus"></i>
                            </button>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Monto a enviar</label>

                            <input type="number" class="form-control" placeholder="Ingrese monto">

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-send">
                                <i class="fa-solid fa-paper-plane me-1"></i>
                                Enviar dinero
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-lg-3 d-none d-lg-block">

                <button class="btn btn-deposit w-100">
                    <i class="fa-solid fa-user-plus me-1"></i>
                    Agregar contacto
                </button>

            </div>

        </div>

    </main>

    <footer class="bg-dark text-light text-center py-3 mt-auto">
        <div class="container d-flex flex-column flex-lg-row justify-content-between align-items-center">

            <div class="mb-2 mb-lg-0 text-center text-lg-start">
                <span class="fw-semibold">💳 Wallet Digital</span>
                <small class="text-secondary d-block">
                    Gestión de finanzas personales
                </small>
            </div>

            <div class="text-center text-lg-end">
                <small class="text-secondary">
                    © 2026 Todos los derechos reservados
                </small>
            </div>

        </div>
    </footer>

    <div class="modal fade" id="newContactModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Nuevo contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-send">Guardar contacto</button>
                </div>

            </div>

        </div>

    </div>

    <div class="modal fade" id="searchContactModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Buscar contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" class="form-control" placeholder="Nombre o correo">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button class="btn btn-send">Buscar</button>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/afc3eba033.js" crossorigin="anonymous"></script>

</body>

</html>
