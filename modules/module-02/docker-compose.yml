services:
  # ─── NGINX ───────────────────────────────
  bt-wallet:
    image: nginx:alpine
    container_name: bt-wallet
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - "./billetera-digital/${WEB_01}:/usr/share/nginx/html"
      - "./default.conf:/etc/nginx/conf.d/default.conf"
    networks:
      net_interna:
        aliases:
          - net-bt-wallet

networks:
  net_interna:
    name: net-server
    driver: bridge
    ipam:
      driver: default
