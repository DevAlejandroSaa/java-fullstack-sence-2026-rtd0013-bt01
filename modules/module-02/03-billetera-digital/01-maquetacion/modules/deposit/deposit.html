<h2 class="text-center mb-4">Depositar</h2>

<div class="col-7 card p-4 mx-auto">

    <form id="depositForm">

        <div class="mb-3">
            <label for="depositAmount" class="form-label">
                Monto a depositar
            </label>

            <input id="depositAmount" type="number" class="form-control form-control-lg" placeholder="Ingrese monto">
        </div>

        <div class="mb-3">
            <label for="depositDepositor" class="form-label">
                Depositante
            </label>

            <input id="depositDepositor" type="text" class="form-control form-control-lg"
                placeholder="Nombre del depositante">
        </div>

        <div class="mb-3">
            <label for="depositBank" class="form-label">
                Banco de origen
            </label>

            <select id="depositBank" class="form-select form-select-lg">
                <option value="">Seleccione un banco</option>
                <option>Banco Estado</option>
                <option>Banco de Chile</option>
                <option>Banco Santander</option>
                <option>Banco BCI</option>
                <option>Scotiabank</option>
                <option>Banco Itaú</option>
                <option>Banco Security</option>
                <option>Banco Falabella</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="depositMethod" class="form-label">
                Método de depósito
            </label>

            <select id="depositMethod" class="form-select form-select-lg">
                <option value="">Seleccione método</option>
                <option>Transferencia</option>
                <option>Efectivo</option>
                <option>Tarjeta</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="depositDescription" class="form-label">
                Descripción (opcional)
            </label>

            <textarea id="depositDescription" class="form-control form-control-lg" rows="2"
                placeholder="Opcional"></textarea>
        </div>

        <button id="depositButton" type="" class="btn btn-lg btn-danger w-100">
            Realizar depósito
        </button>

    </form>

    <div id="depositMessage" class="mt-3 text-center"></div>

</div>
