<h2 class="text-center mb-4">Enviar Dinero</h2>

<div class="container">
    <div class="row g-3">

        <div class="col-12 col-lg-4">

            <h5>Agenda de contactos</h5>

            <form>

                <div class="mb-3">

                    <label class="form-label">Seleccionar contacto</label>

                    <select id="contactSelect" class="form-select">
                        <option value="">Seleccione un contacto</option>
                    </select>

                    <div id="contactSelectError" class="invalid-feedback d-block"></div>

                </div>

            </form>

            <div id="contactPlaceholder"></div>

            <div id="contactDetailsPlaceholder">

                <div>Nombre y Apellido: <span></span></div>
                <div>CBU: <span></span></div>
                <div>Alias: <span></span></div>
                <div>Banco: <span></span></div>

            </div>

        </div>

        <div class="col-12 col-lg-6">

            <h5>Transferencia</h5>

            <form id="sendMoneyForm">

                <div class="mb-3">

                    <label class="form-label">Monto</label>

                    <input id="amount" type="number" class="form-control">

                    <div id="amountError" class="invalid-feedback"></div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Descripción</label>

                    <textarea id="description" class="form-control" rows="2"></textarea>

                </div>

                <button class="btn btn-danger w-100" type="submit">

                    Enviar Dinero

                </button>

            </form>

            <div id="sendMoneyMessage"></div>

        </div>

        <div class="col-12 col-lg-2 d-flex justify-content-center align-items-start">

            <button class="btn btn-danger rounded-circle add-contact-button" data-bs-toggle="modal"
                data-bs-target="#addContactModal">

                <i class="fa-solid fa-plus"></i>

            </button>

        </div>

    </div>
</div>

<div class="modal fade" id="addContactModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content" id="modalContent">
        </div>

    </div>

</div>
