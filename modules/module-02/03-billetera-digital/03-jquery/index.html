<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png"
        href="https://raw.githubusercontent.com/DevAlejandroSaa/java-fullstack-sence-2026-rtd0013-bt01/refs/heads/main/modules/module-02/03-billetera-digital/tortuga.png">

    <title>Wallet Digital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="app.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
    <header id="header" class="row m-0"></header>

    <main class="flex-grow-1">
        <section id="app" class="container py-4"></section>
    </main>

    <footer id="footer" class="bg-dark text-light text-center py-3 mt-auto"></footer>

    <div class="toast-container position-fixed top-0 end-0 p-3">

        <div id="walletToast" class="toast text-bg-primary border-0">

            <div class="d-flex">

                <div id="toastMessage" class="toast-body">
                    Mensaje
                </div>

                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <div id="transitionOverlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/afc3eba033.js" crossorigin="anonymous"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
