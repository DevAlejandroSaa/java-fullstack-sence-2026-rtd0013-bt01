<h2 class="text-center mb-4">Depositar</h2>

<div class="col-7 p-4 mx-auto">

    <form id="depositForm">

        <div class="mb-3">
            <label for="depositAmount" class="form-label">
                Monto a depositar
            </label>

            <input id="depositAmount" type="number" class="form-control" placeholder="Ingrese monto">
        </div>

        <button id="depositButton" type="" class="btn btn-lg btn-danger w-100">
            Realizar depósito
        </button>

    </form>

    <div id="depositMessage" class="mt-3 text-center"></div>

</div>
